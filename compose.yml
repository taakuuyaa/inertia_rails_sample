services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "3036:3036"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
      - node_modules:/app/node_modules
      - tmp:/app/tmp
    environment:
      BINDING: "0.0.0.0"
      VITE_RUBY_HOST: "0.0.0.0"
    tty: true
    stdin_open: true

volumes:
  bundle:
  node_modules:
  tmp:
